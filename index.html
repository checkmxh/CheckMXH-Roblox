<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roblox Profile Checker - Thiện Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
    }
    h1 {
      color: #58a6ff;
      margin-bottom: 30px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #161b22;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(88,166,255,0.15);
      border: 1px solid #30363d;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px;
      margin: 15px 0 20px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0d1117;
      color: #c9d1d9;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      padding: 12px 40px;
      font-size: 16px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #2ea043;
    }
    #result {
      margin-top: 30px;
      font-size: 1.1em;
      line-height: 1.6;
      min-height: 200px;
      text-align: left;
    }
    .profile-card {
      background: #0d1117;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #30363d;
    }
    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #58a6ff;
      object-fit: cover;
      margin: 0 auto 15px;
      display: block;
    }
    .full-avatar {
      width: 300px;
      max-width: 100%;
      border-radius: 8px;
      margin: 20px auto;
      display: block;
    }
    .success { color: #3fb950; }
    .error { color: #f85149; font-weight: bold; }
    .loading {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 4px solid #58a6ff;
      border-top: 4px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    a {
      color: #58a6ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .info {
      margin-top: 40px;
      color: #8b949e;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Roblox Profile Checker</h1>
    
    <input type="text" id="input" placeholder="Nhập Username hoặc UserID (ví dụ: Builderman hoặc 1)" />
    <button onclick="checkProfile()">Xem Profile</button>
    
    <div id="result"></div>
    
    <div class="info">
      Dùng API công khai Roblox • Proxy CORS • Avatar + Description + Join Date + Follow stats
    </div>
  </div>

  <script>
    const proxy = "https://corsproxy.io/?";

    async function fetchWithProxy(url, options = {}) {
      const fullUrl = proxy + encodeURIComponent(url);
      const res = await fetch(fullUrl, options);
      if (!res.ok) throw new Error(`Fetch lỗi: ${res.status} - ${res.statusText}`);
      return res;
    }

    async function checkProfile() {
      const input = document.getElementById("input").value.trim();
      const resultDiv = document.getElementById("result");

      if (!input) {
        resultDiv.innerHTML = '<span class="error">Vui lòng nhập username hoặc UserID!</span>';
        return;
      }

      resultDiv.innerHTML = '<span class="loading"></span> Đang tải profile...';

      try {
        let userId = input;

        // Nếu là username → lấy UserID
        if (isNaN(input)) {
          const usernameUrl = "https://users.roblox.com/v1/usernames/users";
          const usernameRes = await fetchWithProxy(usernameUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ usernames: [input], excludeBannedUsers: true })
          });
          const data = await usernameRes.json();
          if (!data.data || data.data.length === 0) throw new Error("Không tìm thấy username này");
          userId = data.data[0].id;
        }

        // Lấy info chính (displayName, name, description, created)
        const userUrl = `https://users.roblox.com/v1/users/${userId}`;
        const userRes = await fetchWithProxy(userUrl);
        const user = await userRes.json();

        const displayName = user.displayName || user.name || "Unknown";
        const username = user.name || input;
        const description = user.description || "Không có mô tả";
        const created = new Date(user.created).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });

        // Lấy counts: followers, following, friends
        const followersUrl = `https://friends.roblox.com/v1/users/${userId}/followers/count`;
        const followingUrl = `https://friends.roblox.com/v1/users/${userId}/followings/count`;
        const friendsUrl = `https://friends.roblox.com/v1/users/${userId}/friends/count`;

        const [folRes, fingRes, friRes] = await Promise.all([
          fetchWithProxy(followersUrl),
          fetchWithProxy(followingUrl),
          fetchWithProxy(friendsUrl)
        ]);

        const followers = (await folRes.json()).count || 0;
        const following = (await fingRes.json()).count || 0;
        const friends = (await friRes.json()).count || 0;

        // Avatar thumbnails
        const headshotUrl = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=420x420&format=Png&isCircular=true`;
        const bodyUrl = `https://thumbnails.roblox.com/v1/users/avatar?userIds=${userId}&size=720x720&format=Png`;

        const hsRes = await fetchWithProxy(headshotUrl);
        const bodyRes = await fetchWithProxy(bodyUrl);

        const hsData = await hsRes.json();
        const bodyData = await bodyRes.json();

        const headshotImg = hsData.data?.[0]?.imageUrl || "https://via.placeholder.com/420?text=Avatar+Not+Found";
        const bodyImg = bodyData.data?.[0]?.imageUrl || "";

        // Hiển thị profile
        let html = `
          <div class="profile-card">
            <img src="${headshotImg}" alt="Avatar Headshot" class="avatar">
            <h2><a href="https://www.roblox.com/users/${userId}/profile" target="_blank">${displayName}</a></h2>
            <p><strong>Username:</strong> @${username}</p>
            <p><strong>UserID:</strong> ${userId}</p>
            <p><strong>Ngày tham gia:</strong> ${created}</p>
            <p><strong>Mô tả:</strong><br>${description.replace(/\n/g, '<br>')}</p>
            <hr style="border-color:#30363d;">
            <p><strong>Followers:</strong> ${followers.toLocaleString()}</p>
            <p><strong>Following:</strong> ${following.toLocaleString()}</p>
            <p><strong>Friends:</strong> ${friends.toLocaleString()}</p>
          </div>
        `;

        if (bodyImg) {
          html += `<img src="${bodyImg}" alt="Full Body Avatar" class="full-avatar">`;
        }

        resultDiv.innerHTML = html;

      } catch (err) {
        resultDiv.innerHTML = `<span class="error">Lỗi: ${err.message || "Không xác định (F12 xem console)"}</span><br><br>
          Có thể do rate limit, thử lại sau 10s hoặc kiểm tra input.`;
        console.error(err);
      }
    }

    document.getElementById("input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") checkProfile();
    });
  </script>

</body>
</html>
