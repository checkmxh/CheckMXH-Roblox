<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check Follower Roblox</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 30px;
      text-align: center;
    }
    h1 {
      color: #00ccff;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,200,255,0.2);
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 2px solid #444;
      border-radius: 6px;
      background: #222;
      color: white;
      font-size: 16px;
    }
    button {
      padding: 12px 30px;
      font-size: 16px;
      background: #00ccff;
      color: black;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #00aaff;
    }
    #result {
      margin-top: 25px;
      font-size: 1.3em;
      min-height: 60px;
    }
    .error {
      color: #ff5555;
    }
    .info {
      color: #aaa;
      font-size: 0.9em;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Check Số Follower Roblox</h1>
    
    <input type="text" id="input" placeholder="Nhập Username hoặc UserID..." />
    <button onclick="checkFollower()">Kiểm tra</button>
    
    <div id="result"></div>
    
    <div class="info">
      Hỗ trợ cả Username và UserID • Dùng API công khai của Roblox • Không cần đăng nhập
    </div>
  </div>
<script>
  async function checkFollower() {
    const input = document.getElementById("input").value.trim();
    const resultDiv = document.getElementById("result");

    if (!input) {
      resultDiv.innerHTML = '<span class="error">Vui lòng nhập username hoặc UserID!</span>';
      return;
    }

    resultDiv.innerHTML = "Đang tải...";

    try {
      let userId = input;

      // Nếu là username → chuyển thành UserID
      if (isNaN(input)) {
        const usernameRes = await fetch("https://users.roproxy.com/v1/usernames/users", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({
            usernames: [input],
            excludeBannedUsers: true
          })
        });

        if (!usernameRes.ok) throw new Error(`Lỗi API username: ${usernameRes.status}`);

        const usernameData = await usernameRes.json();

        if (!usernameData.data || usernameData.data.length === 0) {
          throw new Error("Không tìm thấy người dùng với username này");
        }

        userId = usernameData.data[0].id;
      }

      // Lấy số follower (dùng roproxy để bypass CORS)
      const followerRes = await fetch(`https://friends.roproxy.com/v1/users/${userId}/followers/count`);

      if (!followerRes.ok) {
        throw new Error(`Không thể lấy follower count (status: ${followerRes.status})`);
      }

      const followerData = await followerRes.json();
      const count = followerData.count || 0;

      // Lấy thông tin user (displayName, username)
      const userInfoRes = await fetch(`https://users.roproxy.com/v1/users/${userId}`);
      let displayName = "";
      let username = input;
      if (userInfoRes.ok) {
        const userInfo = await userInfoRes.json();
        displayName = userInfo.displayName || "";
        username = userInfo.name || input;
      }

      resultDiv.innerHTML = `
        <strong>UserID:</strong> ${userId}<br>
        ${displayName ? `<strong>Tên hiển thị:</strong> ${displayName}<br>` : ""}
        <strong>Username:</strong> ${username}<br>
        <strong>Số follower:</strong> <span style="color:#00ff88;font-size:1.4em;">${count.toLocaleString()}</span>
      `;

    } catch (err) {
      resultDiv.innerHTML = `<span class="error">Lỗi: ${err.message || err}</span>`;
    }
  }

  // Nhấn Enter để tìm
  document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") checkFollower();
  });
</script>
  

</body>
</html>
